<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>健身飲食紀錄 App</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 FontAwesome 圖示庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 讓瀏覽器可以解析 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 隱藏原生卷軸，讓畫面更像 App */
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-gray-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    function App() {
      // API Key State
      const [apiKey, setApiKey] = useState(() => {
        return localStorage.getItem('gemini_api_key') || '';
      });
      const [showSettings, setShowSettings] = useState(() => {
        return !localStorage.getItem('gemini_api_key');
      });
      const [tempApiKey, setTempApiKey] = useState(apiKey);

      const [records, setRecords] = useState(() => {
        try {
          const saved = localStorage.getItem('diet_records');
          return saved ? JSON.parse(saved) : [];
        } catch (e) {
          return [];
        }
      });
      
      const [currentWeekStart, setCurrentWeekStart] = useState(() => {
        const d = new Date();
        d.setHours(0, 0, 0, 0);
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1);
        return new Date(d.setDate(diff));
      });
      
      const [selectedDayIndex, setSelectedDayIndex] = useState(() => {
        const today = new Date().getDay();
        return today === 0 ? 6 : today - 1;
      });

      const [isAdding, setIsAdding] = useState(false);
      const [newFood, setNewFood] = useState({ name: '', calories: '', protein: '', carbs: '', fat: '' });
      const fileInputRef = useRef(null);

      const [isEstimating, setIsEstimating] = useState(false);
      const [aiAdvice, setAiAdvice] = useState('');
      const [isFetchingAdvice, setIsFetchingAdvice] = useState(false);
      
      // Save settings to Local Storage
      useEffect(() => {
        if (apiKey) {
          localStorage.setItem('gemini_api_key', apiKey);
        } else {
          localStorage.removeItem('gemini_api_key');
        }
      }, [apiKey]);

      useEffect(() => {
        localStorage.setItem('diet_records', JSON.stringify(records));
      }, [records]);

      const daysOfWeek = useMemo(() => {
        return Array.from({ length: 7 }).map((_, i) => {
          const d = new Date(currentWeekStart);
          d.setDate(d.getDate() + i);
          return d;
        });
      }, [currentWeekStart]);

      const selectedDate = daysOfWeek[selectedDayIndex];
      const selectedDateStr = `${selectedDate.getFullYear()}-${String(selectedDate.getMonth() + 1).padStart(2, '0')}-${String(selectedDate.getDate()).padStart(2, '0')}`;

      useEffect(() => {
        setAiAdvice('');
      }, [selectedDateStr]);

      const currentDayRecords = useMemo(() => {
        return records.filter(r => r.date === selectedDateStr);
      }, [records, selectedDateStr]);

      const dailyStats = useMemo(() => {
        return currentDayRecords.reduce((acc, curr) => ({
          calories: acc.calories + (Number(curr.calories) || 0),
          protein: acc.protein + (Number(curr.protein) || 0),
          carbs: acc.carbs + (Number(curr.carbs) || 0),
          fat: acc.fat + (Number(curr.fat) || 0),
        }), { calories: 0, protein: 0, carbs: 0, fat: 0 });
      }, [currentDayRecords]);

      const weeklyStats = useMemo(() => {
        const weekDates = daysOfWeek.map(d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`);
        const weekRecords = records.filter(r => weekDates.includes(r.date));
        
        return weekRecords.reduce((acc, curr) => ({
          calories: acc.calories + (Number(curr.calories) || 0),
          protein: acc.protein + (Number(curr.protein) || 0),
          carbs: acc.carbs + (Number(curr.carbs) || 0),
          fat: acc.fat + (Number(curr.fat) || 0),
        }), { calories: 0, protein: 0, carbs: 0, fat: 0 });
      }, [records, daysOfWeek]);

      const handlePrevWeek = () => {
        const newDate = new Date(currentWeekStart);
        newDate.setDate(newDate.getDate() - 7);
        setCurrentWeekStart(newDate);
      };

      const handleNextWeek = () => {
        const newDate = new Date(currentWeekStart);
        newDate.setDate(newDate.getDate() + 7);
        setCurrentWeekStart(newDate);
      };

      const handleAddFood = (e) => {
        e.preventDefault();
        if (!newFood.name.trim()) return;

        const newRecord = {
          id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
          date: selectedDateStr,
          name: newFood.name,
          calories: Number(newFood.calories) || 0,
          protein: Number(newFood.protein) || 0,
          carbs: Number(newFood.carbs) || 0,
          fat: Number(newFood.fat) || 0,
          createdAt: new Date().toISOString()
        };

        setRecords(prev => [...prev, newRecord]);
        setIsAdding(false);
        setNewFood({ name: '', calories: '', protein: '', carbs: '', fat: '' });
      };

      const handleDeleteFood = (id) => {
        setRecords(prev => prev.filter(r => r.id !== id));
      };

      const handleSaveApiKey = (e) => {
        e.preventDefault();
        setApiKey(tempApiKey);
        setShowSettings(false);
      };

      const estimateMacrosWithAI = async () => {
        if (!newFood.name.trim() || !apiKey) {
          if (!apiKey) setShowSettings(true);
          return;
        }
        setIsEstimating(true);
        try {
          const prompt = `估算1份「${newFood.name}」的營養價值。請回傳合理的整數數值。`;
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              generationConfig: {
                responseMimeType: "application/json",
                responseSchema: {
                  type: "OBJECT",
                  properties: {
                    calories: { type: "INTEGER" },
                    protein: { type: "INTEGER" },
                    carbs: { type: "INTEGER" },
                    fat: { type: "INTEGER" }
                  }
                }
              }
            })
          });
          const data = await response.json();
          const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (resultText) {
            const macros = JSON.parse(resultText);
            setNewFood(prev => ({
              ...prev,
              calories: macros.calories || 0,
              protein: macros.protein || 0,
              carbs: macros.carbs || 0,
              fat: macros.fat || 0
            }));
          }
        } catch (error) {
          console.error("AI Estimation Error:", error);
          alert("估算失敗，請確認 API Key 是否正確或網路是否正常。");
        } finally {
          setIsEstimating(false);
        }
      };

      const analyzeImageWithAI = async (e) => {
        const file = e.target.files?.[0];
        if (!file || !apiKey) {
           if (!apiKey) setShowSettings(true);
           return;
        }

        setIsEstimating(true);
        try {
          const base64String = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });

          const prompt = "請分析這張圖片中的食物。給出最可能的餐點名稱（name），以及估算一份該食物的熱量(calories)、蛋白質(protein)、碳水化合物(carbs)和脂肪(fat)。請確保回傳合理的整數數值。";
          
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ 
                role: "user", 
                parts: [
                  { text: prompt },
                  { inlineData: { mimeType: file.type, data: base64String } }
                ] 
              }],
              generationConfig: {
                responseMimeType: "application/json",
                responseSchema: {
                  type: "OBJECT",
                  properties: {
                    name: { type: "STRING" },
                    calories: { type: "INTEGER" },
                    protein: { type: "INTEGER" },
                    carbs: { type: "INTEGER" },
                    fat: { type: "INTEGER" }
                  }
                }
              }
            })
          });
          
          const data = await response.json();
          const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (resultText) {
            const result = JSON.parse(resultText);
            setNewFood({
              name: result.name || '',
              calories: result.calories || 0,
              protein: result.protein || 0,
              carbs: result.carbs || 0,
              fat: result.fat || 0
            });
          }
        } catch (error) {
          console.error("Image Analysis Error:", error);
          alert("圖片分析失敗，請確認 API Key 是否正確。");
        } finally {
          setIsEstimating(false);
          if (fileInputRef.current) fileInputRef.current.value = '';
        }
      };

      const getDailyAIAdvice = async () => {
        if (currentDayRecords.length === 0 || !apiKey) {
           if (!apiKey) setShowSettings(true);
           return;
        }
        setIsFetchingAdvice(true);
        try {
          const foodList = currentDayRecords.map(r => r.name).join('、');
          const prompt = `我今天吃了：${foodList}。總共攝取了 ${dailyStats.calories}大卡，蛋白質 ${dailyStats.protein}g，碳水 ${dailyStats.carbs}g，脂肪 ${dailyStats.fat}g。請以專業健身教練的角度，給予我簡短1~2句繁體中文的飲食建議與鼓勵。`;
          
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }]
            })
          });
          const data = await response.json();
          const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (resultText) {
            setAiAdvice(resultText);
          }
        } catch (error) {
          console.error("AI Advice Error:", error);
          alert("產生建議失敗，請確認 API Key 是否正確。");
        } finally {
          setIsFetchingAdvice(false);
        }
      };

      const dayNames = ['一', '二', '三', '四', '五', '六', '日'];

      const MacroBadge = ({ iconClass, label, value, colorClass, bgClass }) => (
        <div className={`flex flex-col items-center justify-center p-3 rounded-2xl ${bgClass} flex-1`}>
          <i className={`${iconClass} text-lg mb-1 ${colorClass}`}></i>
          <span className={`text-sm font-bold ${colorClass}`}>{value}g</span>
          <span className="text-xs text-gray-500 mt-1">{label}</span>
        </div>
      );

      return (
        <div className="w-full max-w-md mx-auto h-[100dvh] bg-gray-50 flex flex-col font-sans relative overflow-hidden shadow-2xl sm:border sm:border-gray-200">
          
          {/* Settings Modal - Shown if API key is missing or manually triggered */}
          {showSettings && (
            <div className="absolute inset-0 z-[60] flex items-center justify-center bg-gray-900/60 backdrop-blur-sm p-4">
              <div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-xl font-bold text-gray-800">
                    <i className="fa-solid fa-gear text-indigo-500 mr-2"></i>設定
                  </h2>
                  {apiKey && (
                    <button onClick={() => setShowSettings(false)} className="p-2 text-gray-400 hover:text-gray-600 rounded-full">
                      <i className="fa-solid fa-xmark text-lg"></i>
                    </button>
                  )}
                </div>
                
                <form onSubmit={handleSaveApiKey} className="space-y-4">
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-2">Gemini API Key</label>
                    <p className="text-xs text-gray-500 mb-3 leading-relaxed">
                      為了使用 AI 估算與教練建議功能，請填入您的 Google Gemini API Key。此金鑰僅會安全地儲存在您目前裝置的瀏覽器中，不會傳送至其他伺服器。
                    </p>
                    <input 
                      type="password" 
                      placeholder="AIzaSy..."
                      className="w-full bg-gray-50 border border-gray-200 text-gray-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all font-mono text-sm"
                      value={tempApiKey}
                      onChange={e => setTempApiKey(e.target.value)}
                      required
                    />
                  </div>
                  
                  <div className="pt-2 flex gap-3">
                    {apiKey && (
                      <button 
                        type="button" 
                        onClick={() => {
                           setTempApiKey('');
                           setApiKey('');
                           setShowSettings(false);
                        }}
                        className="flex-1 bg-red-50 text-red-600 font-bold rounded-xl py-3 hover:bg-red-100 transition-colors"
                      >
                        清除金鑰
                      </button>
                    )}
                    <button 
                      type="submit" 
                      className="flex-[2] bg-indigo-600 text-white font-bold rounded-xl py-3 hover:bg-indigo-700 transition-colors shadow-sm"
                    >
                      儲存設定
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Header */}
          <div className="bg-white px-4 pt-6 pb-4 shadow-sm z-10 rounded-b-3xl">
            <div className="flex justify-between items-center mb-6">
              <h1 className="text-2xl font-black text-gray-800 tracking-tight flex items-center gap-2">
                <i className="fa-solid fa-chart-line text-indigo-600"></i>
                健身飲食紀錄
              </h1>
              <div className="flex gap-2">
                <button 
                  onClick={() => setShowSettings(true)}
                  className="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors"
                  title="設定 API Key"
                >
                   <i className="fa-solid fa-gear text-sm"></i>
                </button>
                <div className="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center">
                   <i className="fa-solid fa-utensils text-indigo-600"></i>
                </div>
              </div>
            </div>

            {/* Week Navigation */}
            <div className="flex items-center justify-between bg-gray-50 rounded-full p-1 mb-6">
              <button onClick={handlePrevWeek} className="p-2 text-gray-600 hover:bg-white rounded-full transition-colors w-10 h-10 flex items-center justify-center">
                <i className="fa-solid fa-chevron-left"></i>
              </button>
              <div className="flex items-center gap-2 text-sm font-bold text-gray-700">
                <i className="fa-solid fa-calendar-days text-indigo-500"></i>
                {currentWeekStart.getMonth() + 1}/{currentWeekStart.getDate()} - {daysOfWeek[6].getMonth() + 1}/{daysOfWeek[6].getDate()}
              </div>
              <button onClick={handleNextWeek} className="p-2 text-gray-600 hover:bg-white rounded-full transition-colors w-10 h-10 flex items-center justify-center">
                <i className="fa-solid fa-chevron-right"></i>
              </button>
            </div>

            {/* Day Tabs */}
            <div className="flex justify-between items-center gap-1">
              {daysOfWeek.map((day, idx) => {
                const isSelected = idx === selectedDayIndex;
                const isToday = day.toDateString() === new Date().toDateString();
                return (
                  <button
                    key={idx}
                    onClick={() => setSelectedDayIndex(idx)}
                    className={`flex flex-col items-center justify-center w-12 h-16 rounded-2xl transition-all ${
                      isSelected 
                        ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-200 scale-105' 
                        : 'bg-transparent text-gray-500 hover:bg-gray-100'
                    }`}
                  >
                    <span className={`text-xs mb-1 ${isSelected ? 'text-indigo-100' : 'text-gray-400'}`}>
                      {dayNames[idx]}
                    </span>
                    <span className={`text-lg font-bold ${isToday && !isSelected ? 'text-indigo-600' : ''}`}>
                      {day.getDate()}
                    </span>
                    {isToday && <div className={`w-1 h-1 rounded-full mt-1 ${isSelected ? 'bg-white' : 'bg-indigo-600'}`} />}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Main Scrollable Content */}
          <div className="flex-1 overflow-y-auto p-4 pb-24 scroll-smooth">
            
            <div className="bg-white rounded-3xl p-5 shadow-sm mb-6 border border-gray-100">
              <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center justify-between">
                <span>當日總計</span>
                <span className="text-sm font-normal text-gray-500">{selectedDate.getMonth() + 1}月{selectedDate.getDate()}日</span>
              </h2>
              <div className="flex items-end gap-2 mb-5">
                <i className="fa-solid fa-fire text-orange-500 text-3xl"></i>
                <span className="text-4xl font-black text-gray-800 leading-none">{dailyStats.calories}</span>
                <span className="text-gray-500 font-medium mb-1">kcal</span>
              </div>
              
              <div className="flex gap-3">
                <MacroBadge iconClass="fa-solid fa-drumstick-bite" label="蛋白質" value={dailyStats.protein} colorClass="text-blue-600" bgClass="bg-blue-50" />
                <MacroBadge iconClass="fa-solid fa-wheat-awn" label="碳水" value={dailyStats.carbs} colorClass="text-emerald-600" bgClass="bg-emerald-50" />
                <MacroBadge iconClass="fa-solid fa-droplet" label="脂肪" value={dailyStats.fat} colorClass="text-amber-500" bgClass="bg-amber-50" />
              </div>

              {/* AI Advice Section */}
              <div className="mt-5 pt-5 border-t border-gray-100">
                 {aiAdvice ? (
                    <div className="bg-gradient-to-r from-indigo-50 to-purple-50 rounded-2xl p-4 flex gap-3 items-start border border-indigo-100 shadow-sm">
                       <div className="bg-white p-2 rounded-full shadow-sm shrink-0">
                          <i className="fa-solid fa-wand-magic-sparkles text-indigo-600"></i>
                       </div>
                       <p className="text-sm text-indigo-900 leading-relaxed font-medium mt-0.5">{aiAdvice}</p>
                    </div>
                 ) : (
                    <button 
                      onClick={getDailyAIAdvice}
                      disabled={isFetchingAdvice || currentDayRecords.length === 0}
                      className="w-full py-3 px-4 bg-gradient-to-r from-indigo-50 to-purple-50 hover:from-indigo-100 hover:to-purple-100 text-indigo-700 text-sm font-bold rounded-2xl flex items-center justify-center gap-2 transition-all disabled:opacity-50 disabled:cursor-not-allowed border border-indigo-100 shadow-sm"
                    >
                      {isFetchingAdvice ? <i className="fa-solid fa-spinner fa-spin text-lg"></i> : <i className="fa-solid fa-wand-magic-sparkles text-lg"></i>}
                      {currentDayRecords.length === 0 ? "新增飲食後解鎖 AI 建議" : "✨ 產生 AI 每日飲食分析"}
                    </button>
                 )}
              </div>
            </div>

            <div className="mb-6">
              <h3 className="text-sm font-bold text-gray-500 mb-3 px-1 uppercase tracking-wider">飲食紀錄</h3>
              {currentDayRecords.length === 0 ? (
                <div className="bg-white border-2 border-dashed border-gray-200 rounded-2xl p-8 text-center">
                  <div className="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-3">
                     <i className="fa-solid fa-utensils text-gray-300 text-xl"></i>
                  </div>
                  <p className="text-gray-500 font-medium">今天還沒紀錄飲食喔！</p>
                  <p className="text-sm text-gray-400 mt-1">點擊右下角按鈕新增</p>
                </div>
              ) : (
                <div className="space-y-3">
                  {currentDayRecords.map(record => (
                    <div key={record.id} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between group">
                      <div className="flex-1">
                        <h4 className="font-bold text-gray-800 text-lg mb-1">{record.name}</h4>
                        <div className="flex items-center gap-3 text-sm text-gray-500">
                          <span className="flex items-center gap-1 text-orange-500 font-semibold"><i className="fa-solid fa-fire text-xs"></i> {record.calories} kcal</span>
                          <span>P: {record.protein}g</span>
                          <span>C: {record.carbs}g</span>
                          <span>F: {record.fat}g</span>
                        </div>
                      </div>
                      <button 
                        onClick={() => handleDeleteFood(record.id)}
                        className="p-2 text-gray-300 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors"
                      >
                        <i className="fa-solid fa-trash"></i>
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="bg-indigo-600 rounded-3xl p-6 shadow-md text-white">
               <h2 className="text-lg font-bold mb-4 opacity-90 flex items-center gap-2">
                 <i className="fa-solid fa-chart-line"></i> 本週累計
               </h2>
               <div className="grid grid-cols-2 gap-4">
                  <div className="bg-white/10 rounded-2xl p-4">
                    <div className="text-indigo-200 text-xs mb-1">總熱量</div>
                    <div className="text-2xl font-black">{weeklyStats.calories} <span className="text-sm font-normal opacity-80">kcal</span></div>
                  </div>
                  <div className="bg-white/10 rounded-2xl p-4 flex flex-col justify-center gap-1">
                    <div className="flex justify-between text-sm"><span className="text-indigo-200">蛋白質</span> <span className="font-bold">{weeklyStats.protein}g</span></div>
                    <div className="flex justify-between text-sm"><span className="text-indigo-200">碳水</span> <span className="font-bold">{weeklyStats.carbs}g</span></div>
                    <div className="flex justify-between text-sm"><span className="text-indigo-200">脂肪</span> <span className="font-bold">{weeklyStats.fat}g</span></div>
                  </div>
               </div>
            </div>

          </div>

          {/* Floating Action Button */}
          <button 
            onClick={() => setIsAdding(true)}
            className="absolute bottom-6 right-6 w-14 h-14 bg-indigo-600 text-white rounded-full shadow-lg shadow-indigo-300 flex items-center justify-center hover:bg-indigo-700 hover:scale-105 active:scale-95 transition-all z-20"
          >
            <i className="fa-solid fa-plus text-xl"></i>
          </button>

          {/* Add Food Modal */}
          {isAdding && (
            <div className="absolute inset-0 z-50 flex items-end sm:items-center justify-center bg-gray-900/40 backdrop-blur-sm">
              <div className="bg-white w-full sm:w-11/12 max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-xl font-bold text-gray-800">新增飲食紀錄</h2>
                  <button onClick={() => setIsAdding(false)} className="p-2 bg-gray-100 text-gray-500 rounded-full hover:bg-gray-200 w-8 h-8 flex items-center justify-center">
                    <i className="fa-solid fa-xmark"></i>
                  </button>
                </div>
                
                <form onSubmit={handleAddFood} className="space-y-4">
                  <div>
                    <div className="flex justify-between items-end mb-1">
                      <label className="block text-sm font-bold text-gray-700">食物名稱</label>
                      <button 
                        type="button" 
                        onClick={() => fileInputRef.current?.click()} 
                        disabled={isEstimating}
                        className="text-xs text-indigo-600 flex items-center gap-1 font-bold hover:bg-indigo-50 px-2 py-1 rounded-md transition-colors disabled:opacity-50"
                      >
                        <i className="fa-solid fa-camera"></i> 拍照/上傳辨識
                      </button>
                    </div>
                    <div className="flex gap-2">
                      <input 
                        type="text" 
                        required
                        placeholder="例如：雞胸肉便當"
                        className="w-full bg-gray-50 border border-gray-200 text-gray-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all"
                        value={newFood.name}
                        onChange={e => setNewFood({...newFood, name: e.target.value})}
                      />
                      <button
                        type="button"
                        onClick={estimateMacrosWithAI}
                        disabled={!newFood.name.trim() || isEstimating}
                        className="shrink-0 px-4 bg-indigo-100 text-indigo-700 hover:bg-indigo-200 disabled:opacity-50 disabled:cursor-not-allowed rounded-xl flex items-center justify-center transition-colors font-bold text-sm gap-1.5 shadow-sm"
                        title="AI 自動估算營養素"
                      >
                        {isEstimating ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-wand-magic-sparkles"></i>}
                        估算
                      </button>
                    </div>
                    <p className="text-xs text-indigo-500 mt-2 flex items-center gap-1 font-medium">
                      <i className="fa-solid fa-wand-magic-sparkles text-xs"></i> 輸入名稱估算，或使用拍照讓 AI 視覺辨識
                    </p>
                    <input 
                      type="file" 
                      accept="image/*" 
                      ref={fileInputRef} 
                      onChange={analyzeImageWithAI} 
                      className="hidden" 
                    />
                  </div>
                  
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1 flex items-center gap-1"><i className="fa-solid fa-fire text-orange-500"></i> 熱量 (kcal)</label>
                      <input 
                        type="number" 
                        min="0"
                        placeholder="0"
                        className="w-full bg-gray-50 border border-gray-200 text-gray-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400 focus:bg-white transition-all"
                        value={newFood.calories}
                        onChange={e => setNewFood({...newFood, calories: e.target.value})}
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1 flex items-center gap-1"><i className="fa-solid fa-drumstick-bite text-blue-500"></i> 蛋白質 (g)</label>
                      <input 
                        type="number" 
                        min="0"
                        placeholder="0"
                        className="w-full bg-gray-50 border border-gray-200 text-gray-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition-all"
                        value={newFood.protein}
                        onChange={e => setNewFood({...newFood, protein: e.target.value})}
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1 flex items-center gap-1"><i className="fa-solid fa-wheat-awn text-emerald-500"></i> 碳水 (g)</label>
                      <input 
                        type="number" 
                        min="0"
                        placeholder="0"
                        className="w-full bg-gray-50 border border-gray-200 text-gray-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:bg-white transition-all"
                        value={newFood.carbs}
                        onChange={e => setNewFood({...newFood, carbs: e.target.value})}
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1 flex items-center gap-1"><i className="fa-solid fa-droplet text-amber-500"></i> 脂肪 (g)</label>
                      <input 
                        type="number" 
                        min="0"
                        placeholder="0"
                        className="w-full bg-gray-50 border border-gray-200 text-gray-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:bg-white transition-all"
                        value={newFood.fat}
                        onChange={e => setNewFood({...newFood, fat: e.target.value})}
                      />
                    </div>
                  </div>

                  <button 
                    type="submit" 
                    className="w-full bg-indigo-600 text-white font-bold text-lg rounded-xl py-4 mt-6 hover:bg-indigo-700 active:scale-[0.98] transition-all shadow-md"
                  >
                    儲存紀錄
                  </button>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
